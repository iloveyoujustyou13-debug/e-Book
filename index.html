  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookVault - Premium E-Book Library</title>
    <meta name="description" content="BookVault is a premium e-book library with thousands of titles across various categories. Download your favorite books instantly." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />

    <!-- Tailwind CSS via CDN (for demo only; use build step for production) -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: #0f172a;
            color: #f1f5f9;
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 8px;
        }
        body.dark ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        body.dark ::-webkit-scrollbar-thumb {
            background: #60a5fa;
        }

        /* ── Utilities ── */
        .container-custom {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-hover {
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
        }
        body.dark .card-hover:hover {
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
        }

        /* ── Buttons ── */
        .btn-primary {
            background: #3b82f6;
            color: #fff;
            padding: 0.65rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.15s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            color: #3b82f6;
            border: 2px solid #3b82f6;
            padding: 0.6rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }
        .btn-outline:hover {
            background: #3b82f6;
            color: #fff;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        /* ── Admin Sidebar ── */
        .admin-sidebar {
            width: 260px;
            min-height: 100vh;
            background: #0f172a;
            color: #f1f5f9;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }
        .admin-sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: #94a3b8;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .admin-sidebar .nav-item:hover {
            background: #1e293b;
            color: #f1f5f9;
        }
        .admin-sidebar .nav-item.active {
            background: #3b82f6;
            color: #fff;
        }
        .admin-sidebar .nav-item i {
            width: 1.5rem;
            text-align: center;
        }
        .admin-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
            }
            .admin-sidebar.open {
                transform: translateX(0);
            }
            .admin-content {
                margin-left: 0;
                padding: 1rem;
            }
            .admin-toggle {
                display: block !important;
            }
        }
        .admin-toggle {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1100;
            background: #0f172a;
            color: #fff;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* ── Cards ── */
        .book-card {
            background: #fff;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }
        body.dark .book-card {
            background: #1e293b;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.18);
        }
        body.dark .book-card:hover {
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }
        .book-cover {
            aspect-ratio: 2/3;
            object-fit: cover;
            width: 100%;
            background: #e2e8f0;
        }
        body.dark .book-cover {
            background: #334155;
        }

        /* ── Form ── */
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
            color: #0f172a;
        }
        body.dark .form-input {
            background: #1e293b;
            border-color: #334155;
            color: #f1f5f9;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            color: #0f172a;
        }
        body.dark .form-label {
            color: #f1f5f9;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .toast {
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            background: #0f172a;
            color: #fff;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            font-weight: 500;
            animation: slideUp 0.35s ease;
            max-width: 380px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .toast.success {
            background: #16a34a;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.warning {
            background: #f59e0b;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Misc ── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-blue {
            background: #dbeafe;
            color: #1d4ed8;
        }
        body.dark .badge-blue {
            background: #1e3a5f;
            color: #93c5fd;
        }
        .badge-green {
            background: #dcfce7;
            color: #15803d;
        }
        body.dark .badge-green {
            background: #14532d;
            color: #86efac;
        }
        .badge-gold {
            background: #fef3c7;
            color: #b45309;
        }
        body.dark .badge-gold {
            background: #78350f;
            color: #fcd34d;
        }

        .skeleton {
            animation: pulse 1.5s ease-in-out infinite;
            background: #e2e8f0;
            border-radius: 0.75rem;
        }
        body.dark .skeleton {
            background: #334155;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Mobile menu overlay */
        .mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            display: none;
        }
        .mobile-overlay.open {
            display: block;
        }

        /* Ad placeholder */
        .ad-placeholder {
            background: #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            border: 2px dashed #cbd5e1;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.dark .ad-placeholder {
            background: #1e293b;
            border-color: #334155;
            color: #94a3b8;
        }

        /* Responsive tweaks */
        @media (max-width: 640px) {
            .container-custom {
                padding: 0 1rem;
            }
            .book-cover {
                aspect-ratio: 2/3;
            }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- ─── REACT + FIREBASE (via CDN) ─── -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "react-router-dom": "https://esm.sh/react-router-dom@6.20.1",
                "firebase/app": "https://esm.sh/firebase@10.7.1/app",
                "firebase/auth": "https://esm.sh/firebase@10.7.1/auth",
                "firebase/firestore": "https://esm.sh/firebase@10.7.1/firestore"
                // Analytics is removed to avoid component registration error
            }
        }
    </script>

    <script type="module">
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  IMPORTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        import React, {
            useState,
            useEffect,
            useRef,
            useCallback,
            useMemo,
            createContext,
            useContext,
            Fragment
        } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            BrowserRouter,
            Routes,
            Route,
            Link,
            useNavigate,
            useParams,
            useLocation,
            Navigate
        } from 'react-router-dom';

        import { initializeApp } from 'firebase/app';
        // Analytics is not imported to avoid the error
        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            signOut
        } from 'firebase/auth';
        import {
            getFirestore,
            collection,
            doc,
            getDocs,
            getDoc,
            addDoc,
            updateDoc,
            deleteDoc,
            query,
            where,
            orderBy,
            limit,
            startAfter,
            onSnapshot,
            setDoc,
            serverTimestamp,
            increment,
            runTransaction,
            writeBatch
        } from 'firebase/firestore';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  FIREBASE CONFIG (your actual config)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const firebaseConfig = {
            apiKey: "AIzaSyCtZ-yX7RnJfBCUxA724-02xK3MoUWmkM8",
            authDomain: "e-book-library-a1d30.firebaseapp.com",
            projectId: "e-book-library-a1d30",
            storageBucket: "e-book-library-a1d30.firebasestorage.app",
            messagingSenderId: "660215647633",
            appId: "1:660215647633:web:e14fcf8baff2b6f8aa1e30",
            measurementId: "G-2EJQWB1THZ" // Kept but not used (optional)
        };

        const app = initializeApp(firebaseConfig);
        // getAnalytics is not called
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CONTEXT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const AppContext = createContext();

        function AppProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [darkMode, setDarkMode] = useState(() =>
                localStorage.getItem('bookvault-theme') === 'dark'
            );
            const [toasts, setToasts] = useState([]);
            const [books, setBooks] = useState([]);
            const [categories, setCategories] = useState([]);
            const [featuredBooks, setFeaturedBooks] = useState([]);
            const [bookmarks, setBookmarks] = useState(() =>
                JSON.parse(localStorage.getItem('bookvault-bookmarks') || '[]')
            );
            const [stats, setStats] = useState({ totalBooks: 0, totalDownloads: 0, totalCategories: 0 });

            // ── Auth ──
            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            // ── Theme ──
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark');
                    localStorage.setItem('bookvault-theme', 'dark');
                } else {
                    document.body.classList.remove('dark');
                    localStorage.setItem('bookvault-theme', 'light');
                }
            }, [darkMode]);

            // ── Books (realtime) ──
            useEffect(() => {
                const q = query(collection(db, 'books'), orderBy('createdAt', 'desc'));
                const unsub = onSnapshot(q, (snap) => {
                    const list = [];
                    snap.forEach((d) => list.push({ id: d.id, ...d.data() }));
                    setBooks(list);
                    // Featured
                    const featured = list.filter((b) => b.featured === true);
                    setFeaturedBooks(featured);
                    // Categories
                    const catSet = new Set();
                    list.forEach((b) => b.category && catSet.add(b.category));
                    setCategories(Array.from(catSet));
                    // Stats
                    let downloads = 0;
                    list.forEach((b) => downloads += (b.downloads || 0));
                    setStats({
                        totalBooks: list.length,
                        totalDownloads: downloads,
                        totalCategories: catSet.size
                    });
                });
                return () => unsub();
            }, []);

            // ── Bookmarks ──
            useEffect(() => {
                localStorage.setItem('bookvault-bookmarks', JSON.stringify(bookmarks));
            }, [bookmarks]);

            const toggleBookmark = (bookId) => {
                setBookmarks((prev) =>
                    prev.includes(bookId) ? prev.filter((id) => id !== bookId) : [...prev, bookId]
                );
            };

            const isBookmarked = (bookId) => bookmarks.includes(bookId);

            // ── Toast ──
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts((prev) => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts((prev) => prev.filter((t) => t.id !== id));
                }, 4000);
            };

            const removeToast = (id) => {
                setToasts((prev) => prev.filter((t) => t.id !== id));
            };

            // ── Admin check ──
            const isAdmin = useMemo(() => {
                // In production, use custom claims or an admin collection
                // For demo: any logged-in user with email containing "admin"
                if (!user) return false;
                return user.email?.toLowerCase().includes('admin') || false;
            }, [user]);

            const value = {
                user,
                loading,
                darkMode,
                setDarkMode,
                books,
                categories,
                featuredBooks,
                bookmarks,
                toggleBookmark,
                isBookmarked,
                stats,
                addToast,
                toasts,
                removeToast,
                isAdmin,
                db,
                auth
            };

            return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
        }

        function useApp() {
            return useContext(AppContext);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TOAST CONSUMER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function ToastContainer() {
            const { toasts, removeToast } = useApp();
            if (!toasts.length) return null;
            return (
                <div className="toast-container">
                    {toasts.map((t) => (
                        <div key={t.id} className={`toast ${t.type}`} onClick={() => removeToast(t.id)}>
                            <i className={`fas ${t.type === 'success' ? 'fa-check-circle' : t.type === 'error' ? 'fa-exclamation-circle' : 'fa-triangle-exclamation'}`} />
                            {t.message}
                        </div>
                    ))}
                </div>
            );
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LAYOUT: PUBLIC
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function PublicLayout({ children }) {
            const { darkMode, setDarkMode, user, isAdmin, addToast, stats } = useApp();
            const navigate = useNavigate();
            const location = useLocation();
            const [menuOpen, setMenuOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [showSearch, setShowSearch] = useState(false);
            const searchRef = useRef(null);

            const handleSearch = (q) => {
                setSearchQuery(q);
                if (q.trim().length > 0) {
                    const results = stats.books?.filter((b) =>
                        b.title?.toLowerCase().includes(q.toLowerCase()) ||
                        b.author?.toLowerCase().includes(q.toLowerCase()) ||
                        b.category?.toLowerCase().includes(q.toLowerCase())
                    ) || [];
                    setSearchResults(results);
                    setShowSearch(true);
                } else {
                    setSearchResults([]);
                    setShowSearch(false);
                }
            };

            useEffect(() => {
                const handler = (e) => {
                    if (searchRef.current && !searchRef.current.contains(e.target)) {
                        setShowSearch(false);
                    }
                };
                document.addEventListener('click', handler);
                return () => document.removeEventListener('click', handler);
            }, []);

            const navLinks = [
                { to: '/', label: 'Home', icon: 'fa-house' },
                { to: '/books', label: 'Books', icon: 'fa-book' },
                { to: '/categories', label: 'Categories', icon: 'fa-tags' },
                { to: '/about', label: 'About', icon: 'fa-info-circle' },
                { to: '/contact', label: 'Contact', icon: 'fa-envelope' },
            ];

            return (
                <div className="min-h-screen flex flex-col">
                    {/* ─── HEADER ─── */}
                    <header className="glass sticky top-0 z-50">
                        <div className="container-custom flex items-center justify-between h-16 md:h-20">
                            {/* Logo */}

        // ── Book Detail ──
        function BookDetailPage() {
            const { id } = useParams();
            const { books, isBookmarked, toggleBookmark, addToast, darkMode } = useApp();
            const [book, setBook] = useState(null);
            const [loading, setLoading] = useState(true);
            const [related, setRelated] = useState([]);

            useEffect(() => {
                const fetchBook = async () => {
                    setLoading(true);
                    try {
                        const docRef = doc(db, 'books', id);
                        const snap = await getDoc(docRef);
                        if (snap.exists()) {
                            const data = { id: snap.id, ...snap.data() };
                            setBook(data);
                            // Related books
                            const q = query(
                                collection(db, 'books'),
                                where('category', '==', data.category),
                                limit(6)
                            );
                            const qSnap = await getDocs(q);
                            const relatedList = [];
                            qSnap.forEach((d) => {
                                if (d.id !== id) relatedList.push({ id: d.id, ...d.data() });
                            });
                            setRelated(relatedList);
                            // Increment view count (optional)
                        } else {
                            setBook(null);
                        }
                    } catch (e) {
                        console.error('Error fetching book:', e);
                    }
                    setLoading(false);
                };
                if (id) fetchBook();
            }, [id]);

            const handleDownload = async () => {
                if (!book) return;
                try {
                    // Increment download counter
                    const docRef = doc(db, 'books', book.id);
                    await updateDoc(docRef, {
                        downloads: increment(1)
                    });
                    addToast('Download started!', 'success');
                    // Open CDN link in new tab
                    if (book.pdfUrl) {
                        window.open(book.pdfUrl, '_blank');
                    } else {
                        addToast('No PDF URL available for this book.', 'error');
                    }
                } catch (e) {
                    console.error('Download error:', e);
                    addToast('Failed to record download.', 'error');
                }
            };

            if (loading) {
                return (
                    <div className="flex justify-center py-20">
                        <div className="text-center">
                            <div className="skeleton w-16 h-16 rounded-full mx-auto mb-4" />

                                className="w-full rounded-2xl shadow-xl aspect-[2/3] object-cover"
                                onError={(e) => { e.target.src = 'https://via.placeholder.com/400x600/3b82f6/fff?text=📖'; }}
                            />
                        </div>

                        {/* Details */}
                        <div className="md:col-span-2 space-y-4">
                            <div>
                                <span className="badge badge-blue">{book.category || 'Uncategorized'}</span>
                                {book.featured && <span className="badge badge-gold ml-2">⭐ Featured</span>}
                            </div>
                            <h1 className="text-3xl md:text-4xl font-extrabold">{book.title}</h1>
                            <p className="text-lg text-gray-600 dark:text-gray-300">by {book.author || 'Unknown'}</p>

                            {book.language && (
                                <p className="text-sm text-gray-500 dark:text-gray-400">
                                    <i className="fas fa-language mr-1" /> {book.language}
                                </p>
                            )}

                            {book.publishedDate && (
                                <p className="text-sm text-gray-500 dark:text-gray-400">
                                    <i className="fas fa-calendar mr-1" /> Published: {book.publishedDate}
                                </p>
                            )}

                                <p className="text-sm text-gray-500 dark:text-gray-400">

        // ── Admin Add / Edit Book ──
        function AdminBookForm({ mode = 'add', bookId = null }) {
            const { addToast, books } = useApp();
            const navigate = useNavigate();
            const [loading, setLoading] = useState(false);
            const [form, setForm] = useState({
                title: '',
                author: '',
                category: '',
                language: '',
                description: '',
                coverUrl: '',
                pdfUrl: '',
                fileSize: '',
                featured: false,
                publishedDate: '',
            });

            useEffect(() => {
                if (mode === 'edit' && bookId) {
                    const existing = books.find((b) => b.id === bookId);
                    if (existing) {
                        setForm({
                            title: existing.title || '',
                            author: existing.author || '',
                            category: existing.category || '',
                            language: existing.language || '',
                            description: existing.description || '',
                            coverUrl: existing.coverUrl || '',
                            pdfUrl: existing.pdfUrl || '',
                            fileSize: existing.fileSize || '',
                            featured: existing.featured || false,
                            publishedDate: existing.publishedDate || '',
                        });
                    }
                }
            }, [mode, bookId, books]);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setForm((prev) => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value,
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                // Validation
                if (!form.title.trim()) { addToast('Book title is required.', 'error');
                    setLoading(false); return; }
                if (!form.author.trim()) { addToast('Author name is required.', 'error');
                    setLoading(false); return; }
                if (!form.category.trim()) { addToast('Category is required.', 'error');
                    setLoading(false); return; }
                if (!form.pdfUrl.trim()) { addToast('PDF CDN URL is required.', 'error');
                    setLoading(false); return; }

                try {
                    const data = {
                        ...form,
                        downloads: mode === 'add' ? 0 : (books.find(b => b.id === bookId)?.downloads || 0),
                        updatedAt: serverTimestamp(),
                    };

                    if (mode === 'add') {
                        data.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'books'), data);
                        addToast('Book added successfully!', 'success');
                    } else {
                        const ref = doc(db, 'books', bookId);
                        await updateDoc(ref, data);
                        addToast('Book updated successfully!', 'success');
                    }
                    navigate('/admin/books');
                } catch (err) {
                    addToast('Failed to save book. Please try again.', 'error');
                    console.error(err);
                }
                setLoading(false);
            };

            return (
                <div className="max-w-3xl mx-auto">
                    <h1 className="text-2xl font-bold mb-6">
                        {mode === 'add' ? '📝 Add New Book' : '✏️ Edit Book'}
                    </h1>
                    <form onSubmit={handleSubmit} className="space-y-4 bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div className="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label className="form-label">Book Title *</label>
                                <input name="title" value={form.title} onChange={handleChange} className="form-input" placeholder="e.g. The Great Gatsby" required />
                            </div>
                            <div>
                                <label className="form-label">Author Name *</label>
                                <input name="author" value={form.author} onChange={handleChange} className="form-input" placeholder="e.g. F. Scott Fitzgerald" required />
                            </div>
                        </div>

                        <div className="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label className="form-label">Category *</label>
                                <input name="category" value={form.category} onChange={handleChange} className="form-input" placeholder="e.g. Fiction, Science, History" required />
                            </div>
                            <div>
                                <label className="form-label">Language</label>
                                <input name="language" value={form.language} onChange={handleChange} className="form-input" placeholder="e.g. English, Spanish" />
                            </div>
                        </div>

                        <div>
                            <label className="form-label">Description</label>
                            <textarea name="description" value={form.description} onChange={handleChange} rows="4" className="form-input" placeholder="Brief description of the book..." />
                        </div>

                        <div className="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label className="form-label">Cover Image URL</label>
                                <input name="coverUrl" value={form.coverUrl} onChange={handleChange} className="form-input" placeholder="https://example.com/cover.jpg" />
                                <p className="text-xs text-gray-400 mt-1">Paste a URL to the cover image (CDN or any hosting)</p>
                            </div>
                            <div>
                                <label className="form-label">CDN PDF URL *</label>
                                <input name="pdfUrl" value={form.pdfUrl} onChange={handleChange} className="form-input" placeholder="https://cdn.example.com/book.pdf" required />
                                <p className="text-xs text-gray-400 mt-1">Paste the direct CDN link to the PDF file</p>
                            </div>
                        </div>

                        <div className="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label className="form-label">File Size</label>
                                <input name="fileSize" value={form.fileSize} onChange={handleChange} className="form-input" placeholder="e.g. 2.4 MB" />
                            </div>
                            <div>
                                <label className="form-label">Published Date</label>
                                <input name="publishedDate" value={form.publishedDate} onChange={handleChange} className="form-input" placeholder="e.g. 2024-01-15" />
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <input name="featured" type="checkbox" checked={form.featured} onChange={handleChange} className="w-5 h-5 accent-blue-600" />
                            <label className="font-medium">⭐ Feature this book (appears on homepage)</label>
                        </div>

                        <div className="flex gap-3 pt-2">
                            <button type="submit" className="btn-primary" disabled={loading}>
                                {loading ? <><i className="fas fa-spinner fa-spin" /> Saving...</> : (mode === 'add' ? 'Add Book' : 'Update Book')}
                            </button>
                            <Link to="/admin/books" className="btn-outline">Cancel</Link>
                        </div>
                    </form>
                </div>
            );
        }

        // ── Admin Categories ──
        function AdminCategories() {
            const { books, categories, addToast } = useApp();
            const [newCategory, setNewCategory] = useState('');
            const [editing, setEditing] = useState(null);
            const [editValue, setEditValue] = useState('');

            const categoryCounts = {};
            books.forEach((b) => {
                if (b.category) {
                    categoryCounts[b.category] = (categoryCounts[b.category] || 0) + 1;
                }
            });

            const handleAddCategory = () => {
                if (!newCategory.trim()) return;
                if (categories.includes(newCategory.trim())) {
                    addToast('Category already exists.', 'warning');
                    return;
                }
                // Just add to the list (categories are derived from books)
                // We'll create a dummy book or just update the state
                // In a real app, you'd have a categories collection
                addToast(`Category "${newCategory.trim()}" added. You can now assign it to books.`, 'success');
                setNewCategory('');
            };

            const handleRenameCategory = async (oldName, newName) => {
                if (!newName.trim() || oldName === newName.trim()) {
                    setEditing(null);
                    return;
                }
                if (categories.includes(newName.trim())) {
                    addToast('Category already exists.', 'warning');
                    return;
                }
                // Update all books with this category
                try {
                    const q = query(collection(db, 'books'), where('category', '==', oldName));
                    const snap = await getDocs(q);
                    const batch = writeBatch(db);
                    snap.forEach((doc) => {
                        batch.update(doc.ref, { category: newName.trim() });
                    });
                    await batch.commit();
                    addToast(`Category renamed from "${oldName}" to "${newName.trim()}"`, 'success');
                } catch (e) {
                    addToast('Failed to rename category.', 'error');
                }
                setEditing(null);
            };

            const handleDeleteCategory = async (cat) => {
                if (!confirm(`Delete category "${cat}"? This will remove it from all books.`)) return;
                try {
                    const q = query(collection(db, 'books'), where('category', '==', cat));
                    const snap = await getDocs(q);
                    const batch = writeBatch(db);
                    snap.forEach((doc) => {
                        batch.update(doc.ref, { category: '' });
                    });
                    await batch.commit();
                    addToast(`Category "${cat}" removed from all books.`, 'success');
                } catch (e) {
                    addToast('Failed to delete category.', 'error');
                }
            };

            return (
                <div>
                    <div className="flex items-center justify-between mb-6">
                        <h1 className="text-2xl font-bold">🏷️ Manage Categories</h1>
                    </div>

                    <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-6">
                        <h3 className="font-semibold mb-3">Add New Category</h3>
                        <div className="flex gap-3">
                            <input
                                type="text"
                                value={newCategory}
                                onChange={(e) => setNewCategory(e.target.value)}
                                className="form-input flex-1"
                                placeholder="Enter category name..."
                                onKeyDown={(e) => e.key === 'Enter' && handleAddCategory()}
                            />
                            <button onClick={handleAddCategory} className="btn-primary">Add</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                        {categories.map((cat) => (
                            <div key={cat} className="bg-white dark:bg-gray-800 p-4 rounded-xl border border-gray-200 dark:border-gray-700 flex items-center justify-between">
                                {editing === cat ? (
                                    <div className="flex-1 flex gap-2">
                                        <input
                                            type="text"
                                            value={editValue}
                                            onChange={(e) => setEditValue(e.target.value)}
                                            className="form-input flex-1 py-1 px-2 text-sm"
                                            autoFocus
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter') handleRenameCategory(cat, editValue);
                                                if (e.key === 'Escape') setEditing(null);
                                            }}
                                        />
                                        <button onClick={() => handleRenameCategory(cat, editValue)} className="text-green-600 hover:text-green-800">
                                            <i className="fas fa-check" />
                                        </button>
                                        <button onClick={() => setEditing(null)} className="text-gray-500 hover:text-gray-700">
                                            <i className="fas fa-times" />
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <div>
                                            <div className="font-medium">{cat}</div>
                                            <div className="text-xs text-gray-500 dark:text-gray-400">{categoryCounts[cat] || 0} books</div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => { setEditing(cat);
                                                    setEditValue(cat); }}
                                                className="text-blue-600 hover:text-blue-800 dark:text-blue-400"
                                            >
                                                <i className="fas fa-pen" />
                                            </button>
                                            <button
                                                onClick={() => handleDeleteCategory(cat)}
                                                className="text-red-500 hover:text-red-700 dark:text-red-400"
                                            >
                                                <i className="fas fa-trash" />
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ── Admin Users ──
        function AdminUsers() {
            const { addToast } = useApp();
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // In production, you'd fetch users from Firebase Auth or a users collection
                // For demo, we'll show a placeholder
                setLoading(false);
                setUsers([
                    { uid: '1', email: 'admin@bookvault.com', role: 'admin', createdAt: new Date().toISOString() },
                    { uid: '2', email: 'user@example.com', role: 'user', createdAt: new Date().toISOString() },
                ]);
            }, []);

            return (
                <div>
                    <h1 className="text-2xl font-bold mb-6">👥 User Management</h1>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 dark:bg-gray-800/50">
                                    <tr>
                                        <th className="px-4 py-3 text-left font-semibold">Email</th>
                                        <th className="px-4 py-3 text-left font-semibold">Role</th>
                                        <th className="px-4 py-3 text-left font-semibold hidden md:table-cell">Joined</th>
                                        <th className="px-4 py-3 text-right font-semibold">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-200 dark:divide-gray-700">
                                    {users.map((u) => (
                                        <tr key={u.uid} className="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                                            <td className="px-4 py-3">{u.email}</td>
                                            <td className="px-4 py-3">
                                                <span className={`badge ${u.role === 'admin' ? 'badge-gold' : 'badge-blue'}`}>
                                                    {u.role}
                                                </span>
                                            </td>
                                            <td className="px-4 py-3 hidden md:table-cell text-gray-500 dark:text-gray-400">
                                                {new Date(u.createdAt).toLocaleDateString()}
                                            </td>
                                            <td className="px-4 py-3 text-right">
                                                <button className="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400">
                                                    <i className="fas fa-edit" />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <p className="text-xs text-gray-400 mt-4">
                        ⚡ In production, user management requires Firebase Admin SDK or custom backend.
                    </p>
                </div>
            );
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ROUTER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function App() {
            return (
                <AppProvider>
                    <BrowserRouter>
                        <Routes>
                            {/* Public */}
                            <Route path="/" element={<PublicLayout><HomePage /></PublicLayout>} />
                            <Route path="/books" element={<PublicLayout><BooksPage /></PublicLayout>} />
                            <Route path="/book/:id" element={<PublicLayout><BookDetailPage /></PublicLayout>} />
                            <Route path="/categories" element={<PublicLayout><CategoriesPage /></PublicLayout>} />
                            <Route path="/about" element={<PublicLayout><AboutPage /></PublicLayout>} />
                            <Route path="/contact" element={<PublicLayout><ContactPage /></PublicLayout>} />
                            <Route path="/privacy" element={<PublicLayout><PrivacyPage /></PublicLayout>} />
                            <Route path="/terms" element={<PublicLayout><TermsPage /></PublicLayout>} />

                            {/* Admin */}
                            <Route path="/admin/login" element={<AdminLoginPage />} />
                            <Route path="/admin" element={<Navigate to="/admin/dashboard" replace />} />
                            <Route
                                path="/admin/dashboard"
                                element={
                                    <AdminGuard>
                                        <AdminLayout><AdminDashboard /></AdminLayout>
                                    </AdminGuard>
                                }
                            />
                            <Route
                                path="/admin/books"
                                element={
                                    <AdminGuard>
                                        <AdminLayout><AdminBooks /></AdminLayout>
                                    </AdminGuard>
                                }
                            />
                            <Route
                                path="/admin/add-book"
                                element={
                                    <AdminGuard>
                                        <AdminLayout><AdminBookForm mode="add" /></AdminLayout>
                                    </AdminGuard>
                                }
                            />
                            <Route
                                path="/admin/edit-book/:id"
                                element={
                                    <AdminGuard>
                                        <AdminLayout><AdminBookForm mode="edit" bookId={useParams().id} /></AdminLayout>
                                    </AdminGuard>
                                }
                            />
                            <Route
                                path="/admin/categories"
                                element={
                                    <AdminGuard>
                                        <AdminLayout><AdminCategories /></AdminLayout>
                                    </AdminGuard>
                                }
                            />
                            <Route
                                path="/admin/users"
                                element={
                                    <AdminGuard>
                                        <AdminLayout><AdminUsers /></AdminLayout>
                                    </AdminGuard>
                                }
                            />

                            {/* 404 */}
                            <Route path="*" element={<PublicLayout><div className="text-center py-20"><h1 className="text-4xl font-bold">404</h1><p className="text-gray-500">Page not found.</p></div></PublicLayout>} />
                        </Routes>
                    </BrowserRouter>
                </AppProvider>
            );
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
